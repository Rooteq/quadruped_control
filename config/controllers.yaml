controller_manager:
  ros__parameters:
    update_rate: 200


joint_state_broadcaster:
  ros__parameters:
    update_rate: 200
    type: joint_state_broadcaster/JointStateBroadcaster

forward_effort_controller:
  ros__parameters:
    type: forward_command_controller/ForwardCommandController
    joints:
      - fl_m1_s1
      - fl_m2_s2
      - fl_l4_l3
      - fr_m1_s1
      - fr_m2_s2
      - fr_l4_l3
      - bl_m1_s1
      - bl_m2_s2
      - bl_l4_l3
      - br_m1_s1
      - br_m2_s2
      - br_l4_l3

    interface_name: effort

br_foot_broadcaster:
  ros__parameters:
    type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    frame_id: feet
    interface_names:
      force:
        x: br_foot/force.x
        y: br_foot/force.y
        z: br_foot/force.z

bl_foot_broadcaster:
  ros__parameters:
    type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    frame_id: feet_2
    interface_names:
      force:
        x: bl_foot/force.x
        y: bl_foot/force.y
        z: bl_foot/force.z

fr_foot_broadcaster:
  ros__parameters:
    type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    frame_id: feet_3
    interface_names:
      force:
        x: fr_foot/force.x
        y: fr_foot/force.y
        z: fr_foot/force.z

fl_foot_broadcaster:
  ros__parameters:
    type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    frame_id: feet_4
    interface_names:
      force:
        x: fl_foot/force.x
        y: fl_foot/force.y
        z: fl_foot/force.z
